<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="outer">
    <div class="card" id="card">

      <div class="header drag">
        <div class="brand">
          <div class="dot" id="dot"></div>
          <span class="brand-text">Pomodoro</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="pinBtn" title="Always on top">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 2 L12 12 M7 7 L17 7 M6 12 L18 12 L15 17 L9 17 Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="17" x2="12" y2="22" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="theme-btn" id="themeBtn" title="Toggle theme">
            <div class="theme-track"><div class="theme-knob" id="themeKnob"></div></div>
          </button>
          <button class="icon-btn" id="dashboardBtn" title="Work Track">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <line x1="5" y1="20" x2="5" y2="12" stroke-width="2" stroke-linecap="round"/>
              <line x1="12" y1="20" x2="12" y2="6" stroke-width="2" stroke-linecap="round"/>
              <line x1="19" y1="20" x2="19" y2="14" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-btn" id="gearBtn" title="Settings">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="3" stroke-width="2"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="settings-panel" id="settingsPanel" hidden>
        <div class="settings-row">
          <span class="settings-label">Transparency</span>
          <span class="settings-value" id="opacityLabel">100%</span>
        </div>
        <input type="range" min="40" max="100" step="5" value="100" class="slider" id="opacitySlider"/>
        <div class="settings-row" style="margin-top:12px;">
          <span class="settings-label">Sound</span>
          <button class="sound-track" id="soundBtn"><div class="sound-knob" id="soundKnob"></div></button>
        </div>
        <div class="settings-row" style="margin-top:12px;">
          <span class="settings-label">Accent color</span>
          <input type="color" id="neutralColorPicker" class="color-picker" value="#6b6f8f" title="Customize interface color"/>
        </div>
      </div>

      <div class="tabs">
        <button class="tab" id="tabFocus" data-mode="focus">Focus</button>
        <button class="tab" id="tabBreak" data-mode="break">Break</button>
        <button class="tab" id="tabCustom" data-mode="custom">Custom</button>
      </div>

      <div class="custom-controls" id="customControls" hidden>
        <button class="step-btn" id="decCustom">−</button>
        <span class="custom-minutes" id="customMinutes">15 min</span>
        <button class="step-btn" id="incCustom">+</button>
      </div>

      <div class="ring-wrap">
        <div class="ring">
          <svg width="200" height="200" viewBox="0 0 200 200" class="ring-svg">
            <circle cx="100" cy="100" r="88" fill="none" class="ring-track" stroke-width="14"/>
            <circle cx="100" cy="100" r="88" fill="none" id="ringProgress" stroke-width="14" stroke-linecap="round"/>
          </svg>
          <div class="ring-center">
            <span class="time-text" id="timeText">25:00</span>
            <span class="mode-label" id="modeLabel">FOCUS</span>
          </div>
        </div>
      </div>

      <div class="dots" id="dots"></div>

      <div class="controls">
        <button class="reset-btn" id="resetBtn" title="Reset">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M3 12a9 9 0 1 0 3-6.7" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 4v5h5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="main-btn" id="mainBtn">
          <svg id="mainIcon" width="18" height="18" viewBox="0 0 24 24"><path d="M7 4l14 8-14 8V4z"/></svg>
          <span id="mainBtnLabel">Start</span>
        </button>
        <div class="spacer"></div>
      </div>

    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
